# Kramlipi documentation hub — MkDocs Material
# Build: mkdocs build   Serve: mkdocs serve

site_name: Kramlipi Docs
site_url: https://kramlipi.github.io/
site_description: >-
  code-agent — AI CLI for CI failures, failing unit tests, code coverage,
  missing telemetry, and automated merge requests.
site_author: Kramlipi
copyright: Copyright &copy; 2026 Kramlipi

repo_name: kramlipi/kramlipi.github.io
repo_url: https://github.com/kramlipi/kramlipi.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - meta
  - minify:
      minify_html: true
  - social:
      cards_layout_options:
        background_color: "#3949ab"
        color: "#ffffff"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kramlipi

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Examples:
      - Python failing tests: examples/python.md
      - Go failing tests: examples/go.md
      - Java failing tests: examples/java.md
  - Commands: commands.md
  - Experts: experts.md
  - Recipes: recipes.md
  - Coverage: coverage.md
  - Troubleshooting: troubleshooting.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
